{% extends "blog/base.html" %}

{% block title %}Delete News Post{% endblock %}

{% block content %}
<h1>Delete News Post</h1>
<p>Are you sure you want to delete "{{ news_post.title }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'news_detail' news_post.id %}">Cancel</a>
</form>
{% endblock %}
