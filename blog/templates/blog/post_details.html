{% extends "blog/base.html" %}

{% block title %}Post Details{% endblock %}

{% block content %}
<h1>{{post.title }}</h1>
<p>{{post.content }}</p>
<p>
    Author: {{post.author}} <br>
    Created : {{post.created_at }}

</p>
<a href="{% url 'edit_post' post.id%}">Edit</a>
<a href="{% url 'delete_post' post.id%}">Delete</a>

</a>
<br>
<a href="/">Back to Home</a>
{% endblock %}
